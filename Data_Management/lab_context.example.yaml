## Lab Context — Knowledge base for the Data Management Agent
## Copy to lab_context.yaml and fill in your lab's information.
## This file is loaded as system context for Claude API analysis.

lab:
  name: "Example Lab"
  pi: "Dr. Jane Smith"
  pi_email: pi@university.edu
  department: "Department of Computer Science"

# Lab members and their project assignments
members:
  - name: "Alice Johnson"
    email: alice@university.edu
    hpc_username: ajohnson      # Unix username on the cluster
    projects: [protein_folding, md_simulations]
    role: postdoc

  - name: "Bob Chen"
    email: bob@university.edu
    hpc_username: bchen
    projects: [ml_training]
    role: phd_student

  - name: "Carol Williams"
    email: carol@university.edu
    hpc_username: cwilliams
    projects: [protein_folding, data_analysis]
    role: phd_student

# Project definitions
projects:
  protein_folding:
    description: "Protein structure prediction using AlphaFold and custom models"
    data_types: [pdb_files, trajectory, input_configs, model_weights]
    retention: permanent

  md_simulations:
    description: "Molecular dynamics simulations"
    data_types: [trajectory, topology, restart_files, analysis_output]
    retention: 1_year

  ml_training:
    description: "Machine learning model training experiments"
    data_types: [datasets, checkpoints, logs, tensorboard]
    retention: 6_months

  data_analysis:
    description: "General data analysis and visualization"
    data_types: [scripts, plots, processed_data]
    retention: permanent

# Retention policies — rules for automatic cleanup recommendations
retention_policies:
  - pattern: "*/checkpoints/*"
    max_age_days: 90
    action: recommend_delete

  - pattern: "*/logs/*"
    max_age_days: 60
    action: recommend_delete

  - pattern: "*/tmp/*"
    max_age_days: 14
    action: recommend_delete

  - pattern: "*/raw_output/*"
    max_age_days: 180
    action: recommend_delete

  - pattern: "*/published/*"
    action: never_delete

  - pattern: "*/final_results/*"
    action: never_delete
